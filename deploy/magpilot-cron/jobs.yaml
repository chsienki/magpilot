# magpilot-cron jobs definition.
#
# Format: a list of job entries, each with:
#   - name:     unique job name (used as cron arg)
#     agent:    target Magpilot agent (default: magnus)
#     timeout:  seconds for quick-prompt (default: 60)
#     delivery: log | stdout | whatsapp (default: log)
#     prompt:   literal-block multi-line prompt
#
# Note: prompt body must be indented EXACTLY 6 spaces. The parser in run.sh
# is intentionally tiny (awk-based, no python/yq dep). See run.sh.

- name: magnus-heartbeat
  agent: magnus
  timeout: 30
  delivery: log
  prompt: |
      Reply with one short sentence: confirm you're alive and tell me the
      current time per your local clock.

# Future jobs (placeholders -- need supporting scripts/tokens migrated from
# OpenClaw before they can run):

- name: github-daily-report
  agent: magnus
  timeout: 240
  delivery: log
  prompt: |
      Run /home/magnus/bin/github-daily-report.sh with
      GH_CONFIG_DIR=/home/magnus/.config/gh and reproduce the COMPLETE
      output verbatim (markdown). Don't summarize -- I want the full report.

# Once Phase E (WhatsApp sidecar) outbound delivery is wired into run.sh,
# change `delivery: log` above to `delivery: whatsapp` so the report goes
# to the user's phone every morning.
