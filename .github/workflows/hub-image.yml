name: Hub image

# Builds the Magpilot Hub container image and publishes it to GitHub
# Container Registry (GHCR). Two trigger paths, intentionally
# different in what they tag:
#
#   1. Push to main:    tags `:main` and `:main-<short-sha>`. Lets us
#      pull a known-good post-merge build by SHA without retagging
#      `:latest`. Also catches "the build is broken" before a release
#      tag goes out.
#
#   2. Tag push v*.*.*: tags `:<full-version>`, `:<major.minor>` and
#      `:latest`. The LXC's watchtower watches `:latest` for the
#      auto-pull/restart cadence, while `:<version>` lets us pin a
#      compose file to a specific release for staging or rollback.
#
# Image: ghcr.io/<owner>/magpilot-hub
# Public package: anyone can pull, no docker login on the LXC.

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}

# Avoid stomping on a tag-triggered build with a quick follow-up
# main push, but always run the latest commit on main.
concurrency:
  group: hub-image-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  packages: write   # required to publish to GHCR

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # GHCR org+repo names must be lowercase even though GitHub allows
      # mixed-case in handles. Compute once so downstream steps don't
      # have to deal with the casing dance.
      - name: Compute image name
        id: image
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/magpilot-hub" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      # docker/metadata-action figures out the right tag set for us:
      #   * `type=ref,event=branch` -> :main on a main push
      #   * `type=sha,prefix=main-` -> :main-<short-sha> on a main push
      #   * `type=semver,pattern={{version}}` -> :0.1.11 on tag v0.1.11
      #   * `type=semver,pattern={{major}}.{{minor}}` -> :0.1
      #   * `type=raw,value=latest,enable=...` -> :latest only on tag pushes
      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=main-,format=short,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=Magpilot Hub
            org.opencontainers.image.description=Central daemon for the Magpilot multi-host Copilot CLI multiplexer.

      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Magpilot.Hub/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
