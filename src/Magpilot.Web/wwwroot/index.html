<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
    <title>MagPilot</title>
    <base href="/" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="_content/MudBlazor/MudBlazor.min.css" />
    <link rel="stylesheet" href="css/app.css?v=3" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#FAF6EE" />
    <link href="Magpilot.Web.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <div class="loading-progress-container">
            <div class="loading-progress-stack">
                <img class="loading-mark" src="_content/Magpilot.UI/favicon-mark.svg" alt="" />
                <svg class="loading-progress" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45"></circle>
                    <circle cx="50" cy="50" r="45"></circle>
                </svg>
            </div>
            <div class="loading-progress-text"></div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <!-- ?v=N busts the browser cache when this file changes.
         Blazor framework files are content-hashed automatically,
         but our hand-written wwwroot/js + css aren't. Bump v on
         every behavioural change to error-capture.js / app.css
         until we wire proper asset fingerprinting. -->
    <script src="js/error-capture.js?v=1"></script>
    <script>
        window.magpilot = window.magpilot || {};
        window.magpilot.scrollToBottom = function (el) {
            if (!el) return;
            // requestAnimationFrame so the DOM has a chance to lay out the
            // newly-added message before we measure scrollHeight.
            requestAnimationFrame(() => { el.scrollTop = el.scrollHeight; });
        };
    </script>
</body>

</html>
